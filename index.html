<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAPODIK DIGITAL - Multi Platform</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">

  <!-- Loader Transisi Aplikasi -->
  <div id="app-loader" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center transition-all duration-300">
    <div class="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center max-w-xs w-full mx-4">
      <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent mb-4"></div>
      <p class="text-sm font-semibold text-slate-700" id="loader-text">Memuat aplikasi...</p>
    </div>
  </div>

  <!-- Alert System Custom (Ganti Browser Alert) -->
  <div id="custom-alert" class="fixed top-5 right-5 z-50 max-w-md transform translate-x-full transition-transform duration-300 ease-out hidden">
    <div class="bg-white border-l-4 border-indigo-600 shadow-xl rounded-r-xl p-4 flex items-start gap-3">
      <div id="alert-icon-container" class="text-indigo-600 mt-0.5">
        <i class="fa-solid fa-circle-info text-lg"></i>
      </div>
      <div class="flex-1">
        <h4 class="font-bold text-slate-800 text-sm" id="alert-title">Pemberitahuan</h4>
        <p class="text-xs text-slate-600 mt-1" id="alert-message">Pesan notifikasi di sini.</p>
      </div>
      <button onclick="closeAlert()" class="text-slate-400 hover:text-slate-600 transition-colors">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
  </div>

  <!-- CONTAINER UTAMA UNTUK SPA NAVIGATION -->
  <main id="app-content" class="flex-1 flex flex-col min-h-screen">
    <!-- Halaman default di-load di sini secara dinamis -->
  </main>

  <!-- ======================================================================= -->
  <!-- 1. COMPONENT LOGIN TEMPLATE -->
  <!-- ======================================================================= -->
  <template id="temp-login">
    <div class="min-h-screen flex items-center justify-center bg-gradient-to-tr from-slate-900 via-indigo-950 to-slate-900 px-4 py-12 relative overflow-hidden animate-fade-in">
      <div class="absolute w-96 h-96 bg-indigo-500/10 rounded-full blur-3xl -top-12 -left-12"></div>
      <div class="absolute w-96 h-96 bg-emerald-500/10 rounded-full blur-3xl -bottom-12 -right-12"></div>
      
      <div class="bg-white/95 backdrop-blur-md w-full max-w-md p-8 rounded-3xl shadow-2xl border border-white/20 transition-all duration-300">
        <div class="flex flex-col items-center mb-8">
          <div id="login-logo-container" class="w-20 h-20 bg-gradient-to-tr from-indigo-600 to-indigo-800 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/30 mb-4 overflow-hidden p-1.5">
            <i id="login-default-icon" class="fa-solid fa-graduation-cap text-white text-3xl animate-bounce"></i>
            <img id="login-custom-logo" class="hidden w-full h-full object-cover rounded-xl" src="" alt="Logo Sekolah">
          </div>
          <h2 id="login-app-title" class="text-2xl font-extrabold text-slate-800 tracking-tight text-center">DAPODIK DIGITAL</h2>
          <p id="login-app-slogan" class="text-xs text-slate-500 mt-1.5 uppercase tracking-wider font-semibold text-center">Sistem Portal Pendidikan Modern</p>
        </div>

        <form id="form-login" class="space-y-5" onsubmit="handleLoginSubmit(event)">
          <div>
            <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Username</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                <i class="fa-solid fa-user"></i>
              </span>
              <input type="text" id="login-username" required class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-sm" placeholder="Masukkan username">
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Password</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                <i class="fa-solid fa-lock"></i>
              </span>
              <input type="password" id="login-password" required class="w-full pl-10 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-sm" placeholder="Masukkan password">
              <button type="button" onclick="togglePasswordVisibility()" class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600">
                <i class="fa-solid fa-eye" id="toggle-password-icon"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="w-full py-3 bg-gradient-to-r from-indigo-600 to-indigo-800 text-white font-bold rounded-xl shadow-lg shadow-indigo-600/30 hover:opacity-95 transform active:scale-95 transition-all text-sm">
            Masuk Sekarang <i class="fa-solid fa-arrow-right ml-2"></i>
          </button>
        </form>

        <!-- Jembatan Integrasi ke Apps Script -->
        <div id="gas-bridge-container" class="mt-4 pt-4 border-t border-slate-100 hidden">
          <button type="button" onclick="toggleGasBridgeInput()" class="text-[11px] text-indigo-600 hover:text-indigo-800 font-bold transition-all flex items-center justify-center gap-1 mx-auto">
            <i class="fa-solid fa-circle-nodes"></i> Pengaturan Jembatan Database (Hosting Mode)
          </button>
          <div id="gas-url-form" class="hidden mt-3 space-y-2">
            <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-wider">URL Aplikasi Web Google Apps Script (Web App URL)</label>
            <input type="url" id="gas-url-input" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="https://script.google.com/macros/s/.../exec">
            <div class="flex gap-2">
              <button type="button" onclick="saveGasUrl()" class="flex-1 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-[10px] rounded-lg shadow-sm transition-all">Hubungkan</button>
              <button type="button" onclick="clearGasUrl()" class="flex-1 py-2 bg-slate-100 text-slate-700 border border-slate-200 font-bold text-[10px] rounded-lg hover:bg-slate-200 transition-all">Gunakan Demo</button>
            </div>
          </div>
        </div>
        
        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
          <p id="login-app-footer" class="text-xs text-slate-400">DAPODIK Web App v3.0 &copy; 2026</p>
        </div>
      </div>
    </div>
  </template>

  <!-- ======================================================================= -->
  <!-- 2. COMPONENT DASHBOARD ADMIN TEMPLATE -->
  <!-- ======================================================================= -->
  <template id="temp-db-admin">
    <div class="flex-1 flex flex-col md:flex-row min-h-screen">
      <!-- Sidebar Admin -->
      <aside class="w-full md:w-64 bg-slate-900 text-white flex flex-col border-r border-slate-800">
        <div class="p-5 border-b border-slate-800 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div id="sidebar-logo-container" class="p-2 bg-indigo-600 rounded-xl w-11 h-11 flex items-center justify-center overflow-hidden">
              <i id="sidebar-default-icon" class="fa-solid fa-shield-halved text-white text-lg"></i>
              <img id="sidebar-custom-logo" class="hidden w-full h-full object-cover rounded-lg" src="" alt="Logo Sekolah">
            </div>
            <div>
              <h1 id="sidebar-app-title" class="font-bold text-sm tracking-wide">ADMIN PORTAL</h1>
              <p id="sidebar-app-subtitle" class="text-[10px] text-slate-400">Dapodik Administrator</p>
            </div>
          </div>
        </div>

        <nav class="p-4 flex-1 space-y-1 overflow-y-auto custom-scrollbar">
          <button onclick="switchAdminTab('overview')" id="btn-tab-overview" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all text-indigo-400 bg-slate-800/50">
            <i class="fa-solid fa-chart-pie w-5"></i> Ringkasan
          </button>

          <!-- Dropdown Siswa -->
          <div class="space-y-1">
            <button onclick="toggleSiswaMenu()" class="w-full flex items-center justify-between px-4 py-3 rounded-xl text-sm font-semibold transition-all text-slate-400 hover:bg-slate-800 hover:text-white">
              <span class="flex items-center gap-3">
                <i class="fa-solid fa-user-graduate w-5"></i> Data Siswa
              </span>
              <i class="fa-solid fa-chevron-down text-xs transition-transform duration-200" id="icon-arrow-siswa"></i>
            </button>
            <div id="submenu-siswa" class="hidden pl-9 space-y-1 transition-all duration-300">
              <button onclick="switchAdminTab('siswa-sd')" id="btn-tab-siswa-sd" class="w-full text-left px-3 py-2 rounded-lg text-xs font-semibold text-slate-400 hover:bg-slate-800 hover:text-white flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> SD
              </button>
              <button onclick="switchAdminTab('siswa-smp')" id="btn-tab-siswa-smp" class="w-full text-left px-3 py-2 rounded-lg text-xs font-semibold text-slate-400 hover:bg-slate-800 hover:text-white flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span> SMP
              </button>
              <button onclick="switchAdminTab('siswa-sma')" id="btn-tab-siswa-sma" class="w-full text-left px-3 py-2 rounded-lg text-xs font-semibold text-slate-400 hover:bg-slate-800 hover:text-white flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-indigo-400"></span> SMA
              </button>
              <button onclick="switchAdminTab('siswa-emis')" id="btn-tab-siswa-emis" class="w-full text-left px-3 py-2 rounded-lg text-xs font-semibold text-slate-400 hover:bg-slate-800 hover:text-white flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> EMIS
              </button>
            </div>
          </div>

          <!-- Dropdown Guru -->
          <div class="space-y-1">
            <button onclick="toggleGuruMenu()" class="w-full flex items-center justify-between px-4 py-3 rounded-xl text-sm font-semibold transition-all text-slate-400 hover:bg-slate-800 hover:text-white">
              <span class="flex items-center gap-3">
                <i class="fa-solid fa-chalkboard-user w-5"></i> Data Guru
              </span>
              <i class="fa-solid fa-chevron-down text-xs transition-transform duration-200" id="icon-arrow-guru"></i>
            </button>
            <div id="submenu-guru" class="hidden pl-9 space-y-1 transition-all duration-300">
              <button onclick="switchAdminTab('guru-sd')" id="btn-tab-guru-sd" class="w-full text-left px-3 py-2 rounded-lg text-xs font-semibold text-slate-400 hover:bg-slate-800 hover:text-white flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> SD
              </button>
              <button onclick="switchAdminTab('guru-smp')" id="btn-tab-guru-smp" class="w-full text-left px-3 py-2 rounded-lg text-xs font-semibold text-slate-400 hover:bg-slate-800 hover:text-white flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span> SMP
              </button>
              <button onclick="switchAdminTab('guru-sma')" id="btn-tab-guru-sma" class="w-full text-left px-3 py-2 rounded-lg text-xs font-semibold text-slate-400 hover:bg-slate-800 hover:text-white flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-indigo-400"></span> SMA
              </button>
              <button onclick="switchAdminTab('guru-emis')" id="btn-tab-guru-emis" class="w-full text-left px-3 py-2 rounded-lg text-xs font-semibold text-slate-400 hover:bg-slate-800 hover:text-white flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> EMIS
              </button>
            </div>
          </div>

          <!-- Dropdown Tendik -->
          <div class="space-y-1">
            <button onclick="toggleTendikMenu()" class="w-full flex items-center justify-between px-4 py-3 rounded-xl text-sm font-semibold transition-all text-slate-400 hover:bg-slate-800 hover:text-white">
              <span class="flex items-center gap-3">
                <i class="fa-solid fa-user-gear w-5"></i> Data Tendik
              </span>
              <i class="fa-solid fa-chevron-down text-xs transition-transform duration-200" id="icon-arrow-tendik"></i>
            </button>
            <div id="submenu-tendik" class="hidden pl-9 space-y-1 transition-all duration-300">
              <button onclick="switchAdminTab('tendik-sd')" id="btn-tab-tendik-sd" class="w-full text-left px-3 py-2 rounded-lg text-xs font-semibold text-slate-400 hover:bg-slate-800 hover:text-white flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> SD
              </button>
              <button onclick="switchAdminTab('tendik-smp')" id="btn-tab-tendik-smp" class="w-full text-left px-3 py-2 rounded-lg text-xs font-semibold text-slate-400 hover:bg-slate-800 hover:text-white flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span> SMP
              </button>
              <button onclick="switchAdminTab('tendik-sma')" id="btn-tab-tendik-sma" class="w-full text-left px-3 py-2 rounded-lg text-xs font-semibold text-slate-400 hover:bg-slate-800 hover:text-white flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-indigo-400"></span> SMA
              </button>
              <button onclick="switchAdminTab('tendik-emis')" id="btn-tab-tendik-emis" class="w-full text-left px-3 py-2 rounded-lg text-xs font-semibold text-slate-400 hover:bg-slate-800 hover:text-white flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> EMIS
              </button>
            </div>
          </div>

          <button onclick="switchAdminTab('db-settings')" id="btn-tab-db-settings" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all text-slate-400 hover:bg-slate-800 hover:text-white">
            <i class="fa-solid fa-database w-5"></i> Setup Database
          </button>
        </nav>

        <div class="p-4 border-t border-slate-800">
          <div class="flex items-center gap-3 mb-3 p-2 bg-slate-800/30 rounded-xl">
            <div class="w-8 h-8 rounded-full bg-indigo-500 flex items-center justify-center font-bold text-xs" id="admin-initial">A</div>
            <div class="flex-1 min-w-0">
              <h2 class="text-xs font-bold truncate" id="admin-name">Admin</h2>
              <p class="text-[10px] text-slate-400 truncate" id="admin-email">admin@dapodik.id</p>
            </div>
          </div>
          <button onclick="logout()" class="w-full py-2.5 px-4 bg-rose-600/15 hover:bg-rose-600/20 text-rose-400 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-2">
            <i class="fa-solid fa-right-from-bracket"></i> Keluar Aplikasi
          </button>
        </div>
      </aside>

      <!-- Konten Utama Admin -->
      <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between">
          <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2" id="admin-page-title">
            <i class="fa-solid fa-chart-pie text-indigo-600"></i> Ringkasan Sistem
          </h2>
          <div class="text-xs text-slate-500 font-semibold flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-lg">
            <i class="fa-solid fa-circle text-emerald-500 animate-pulse"></i> DB Terhubung: <span id="current-ss-name" class="text-slate-800 truncate max-w-[120px]">Memuat...</span>
          </div>
        </header>

        <section class="flex-1 p-6 overflow-y-auto custom-scrollbar" id="admin-view-area">
          <!-- Content diisi via JS -->
        </section>
      </main>
    </div>

    <!-- MODAL DINAMIS UNTUK FORM -->
    <div id="admin-crud-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40 flex items-center justify-center p-4 hidden">
      <div class="bg-white w-full max-w-4xl rounded-2xl shadow-2xl flex flex-col max-h-[90vh]">
        <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50 rounded-t-2xl">
          <h3 class="font-bold text-slate-800" id="crud-modal-title">Form Input Data</h3>
          <button onclick="closeCrudModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
        </div>
        <form id="crud-dynamic-form" onsubmit="handleCrudSubmit(event)" class="flex-1 overflow-y-auto custom-scrollbar p-6">
          <input type="hidden" id="crud-row-num">
          <div id="crud-fields-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Fields generated dynamically -->
          </div>
          <div class="pt-6 mt-6 border-t border-slate-100 flex justify-end gap-3">
            <button type="button" onclick="closeCrudModal()" class="px-5 py-2.5 text-xs font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-lg transition-all">Batal</button>
            <button type="submit" class="px-6 py-2.5 text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow shadow-indigo-600/30 transition-all">Simpan Data</button>
          </div>
        </form>
      </div>
    </div>
  </template>

  <!-- ======================================================================= -->
  <!-- 3. COMPONENT DASHBOARD SISWA TEMPLATE -->
  <!-- ======================================================================= -->
  <template id="temp-db-siswa">
    <div class="flex-1 flex flex-col min-h-screen bg-slate-50 animate-fade-in">
      <header class="bg-indigo-950 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div id="siswa-logo-container" class="p-2 bg-indigo-700/50 rounded-xl w-11 h-11 flex items-center justify-center overflow-hidden">
              <i id="siswa-default-icon" class="fa-solid fa-graduation-cap text-white text-lg"></i>
              <img id="siswa-custom-logo" class="hidden w-full h-full object-cover rounded-lg" src="" alt="Logo Sekolah">
            </div>
            <div>
              <h1 class="font-bold text-sm leading-tight" id="siswa-nav-title">SISWA PORTAL</h1>
              <p class="text-[9px] uppercase tracking-wider text-indigo-300" id="siswa-nav-subtitle">Dapodik Akademik</p>
            </div>
          </div>
          <button onclick="logout()" class="px-3 py-1.5 bg-indigo-800 hover:bg-rose-600 text-xs font-bold rounded-lg transition-colors flex items-center gap-1.5">
            Keluar <i class="fa-solid fa-right-from-bracket"></i>
          </button>
        </div>
      </header>

      <main class="max-w-6xl mx-auto px-4 py-8 flex-1 w-full space-y-6">
        <div class="bg-gradient-to-r from-indigo-700 to-indigo-900 text-white p-6 rounded-2xl shadow-lg relative overflow-hidden">
          <div class="absolute right-0 bottom-0 w-32 h-32 bg-white/5 rounded-full blur-xl"></div>
          <h2 class="text-xl font-bold">Halo, <span id="siswa-display-name">Siswa</span>!</h2>
          <p class="text-xs text-indigo-200 mt-1 max-w-lg leading-relaxed">Selamat datang di Portal Siswa Dapodik. Di sini Anda dapat memantau profil akademik dan detail pendaftaran Anda secara langsung.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col items-center text-center">
            <div class="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 text-3xl font-extrabold mb-4" id="siswa-avatar">S</div>
            <h3 class="font-bold text-slate-800 text-sm" id="siswa-profile-name">Memuat nama...</h3>
            <p class="text-xs text-slate-500 mt-1" id="siswa-profile-nisn">ID Siswa: -</p>
            <div class="mt-4 px-3 py-1 bg-emerald-50 text-emerald-600 font-bold text-[10px] rounded-full uppercase">Siswa Aktif</div>
            <div class="mt-2 text-[10px] text-slate-400 font-semibold uppercase tracking-wider" id="siswa-detected-level">Jenjang: Memuat...</div>
          </div>

          <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm md:col-span-2">
            <h3 class="font-bold text-slate-800 text-sm mb-4 pb-2 border-b border-slate-100"><i class="fa-solid fa-address-card text-indigo-600 mr-1.5"></i>Data Akademik Lengkap</h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-xs max-h-[60vh] overflow-y-auto custom-scrollbar p-1" id="siswa-academic-data">
              <p class="text-slate-400 py-4 col-span-2 text-center animate-pulse">Mengunduh profil siswa...</p>
            </div>
          </div>
        </div>
      </main>
    </div>
  </template>

  <!-- ======================================================================= -->
  <!-- 4. COMPONENT DASHBOARD GURU TEMPLATE -->
  <!-- ======================================================================= -->
  <template id="temp-db-guru">
    <div class="flex-1 flex flex-col min-h-screen bg-slate-50 animate-fade-in">
      <header class="bg-emerald-950 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div id="guru-logo-container" class="p-2 bg-emerald-700/50 rounded-xl w-11 h-11 flex items-center justify-center overflow-hidden">
              <i id="guru-default-icon" class="fa-solid fa-chalkboard-user text-white text-lg"></i>
              <img id="guru-custom-logo" class="hidden w-full h-full object-cover rounded-lg" src="" alt="Logo Sekolah">
            </div>
            <div>
              <h1 class="font-bold text-sm leading-tight" id="guru-nav-title">GURU PORTAL</h1>
              <p class="text-[9px] uppercase tracking-wider text-emerald-300" id="guru-nav-subtitle">Dapodik Pendidik</p>

  <script>
    // Global Configuration (APP_CONFIG) untuk menaruh URL Apps Script secara langsung
    window.APP_CONFIG = {
      // ⚠️ SILAKAN TEMPELKAN URL DEPLOYMENT WEB APP GOOGLE APPS SCRIPT ANDA DI SINI:
      scriptUrl: ""
    };

    // Global State
    let currentUser = null;
    let activeAdminTab = "overview";
    let loadedSheetData = {};
    let isOverviewDataFetched = false;
    let selectedOverviewJenjang = "";
    let currentTableLimit = "10";

    let overviewStats = {
      siswa_sd: 0, siswa_smp: 0, siswa_sma: 0, siswa_emis: 0,
      guru_sd: 0, guru_smp: 0, guru_sma: 0, guru_emis: 0,
      tendik_sd: 0, tendik_smp: 0, tendik_sma: 0, tendik_emis: 0
    };

    // Helper untuk mengaplikasikan logo & judul kustom yang disimpan di memori browser secara instan
    function applyGlobalIdentity() {
      const customTitle = localStorage.getItem('dapodik_custom_title') || "DAPODIK DIGITAL";
      document.title = customTitle;
    }

    // Sederhana Router / Renderer
    function showLoader(text = "Memproses...") {
      const loaderText = document.getElementById('loader-text');
      const loader = document.getElementById('app-loader');
      if (loaderText) loaderText.innerText = text;
      if (loader) {
        loader.classList.remove('hidden');
        loader.classList.remove('opacity-0');
      }
    }

    // Pengaman loader agar langsung tertutup jika butuh bypass pratinjau
    function hideLoader() {
      const loader = document.getElementById('app-loader');
      if (loader) {
        loader.classList.add('opacity-0');
        setTimeout(() => {
          loader.classList.add('hidden');
        }, 300);
      }
    }

    // Custom Alert System
    function showAlert(title, message, type = "info") {
      const alertEl = document.getElementById('custom-alert');
      const titleEl = document.getElementById('alert-title');
      const messageEl = document.getElementById('alert-message');
      const containerEl = alertEl ? alertEl.querySelector('div') : null;
      const iconContainer = document.getElementById('alert-icon-container');

      if (!alertEl || !titleEl || !messageEl || !containerEl || !iconContainer) return;

      titleEl.innerText = title;
      messageEl.innerText = message;

      containerEl.className = "bg-white border-l-4 shadow-xl rounded-r-xl p-4 flex items-start gap-3";
      
      if (type === "success") {
        containerEl.classList.add('border-emerald-500');
        iconContainer.innerHTML = '<i class="fa-solid fa-circle-check text-emerald-500 text-lg"></i>';
      } else if (type === "error") {
        containerEl.classList.add('border-rose-500');
        iconContainer.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-rose-500 text-lg"></i>';
      } else {
        containerEl.classList.add('border-indigo-500');
        iconContainer.innerHTML = '<i class="fa-solid fa-circle-info text-indigo-500 text-lg"></i>';
      }

      alertEl.classList.remove('hidden');
      setTimeout(() => {
        alertEl.classList.remove('translate-x-full');
      }, 10);

      // Auto close after 5 seconds
      setTimeout(closeAlert, 5000);
    }

    function closeAlert() {
      const alertEl = document.getElementById('custom-alert');
      if (alertEl) {
        alertEl.classList.add('translate-x-full');
        setTimeout(() => {
          alertEl.classList.add('hidden');
        }, 300);
      }
    }

    // Navigasi Router SPA
    function navigateToDashboard(role) {
      if (role === 'Admin') {
        if (typeof renderDashboardAdmin === 'function') {
          renderDashboardAdmin();
        } else {
          console.error("renderDashboardAdmin is not defined");
        }
      } else if (role === 'Siswa') {
        if (typeof renderDashboardSiswa === 'function') {
          renderDashboardSiswa();
        } else {
          console.error("renderDashboardSiswa is not defined");
        }
      } else if (role === 'Guru') {
        if (typeof renderDashboardGuru === 'function') {
          renderDashboardGuru();
        } else {
          console.error("renderDashboardGuru is not defined");
        }
      } else if (role === 'Tendik') {
        if (typeof renderDashboardTendik === 'function') {
          renderDashboardTendik();
        } else {
          console.error("renderDashboardTendik is not defined");
        }
      } else {
        if (typeof renderLogin === 'function') {
          renderLogin();
        }
      }
    }

    function logout() {
      showLoader("Melakukan logout...");
      localStorage.removeItem('dapodik_user');
      currentUser = null;
      setTimeout(() => {
        if (typeof renderLogin === 'function') {
          renderLogin();
        }
        hideLoader();
        showAlert("Keluar Berhasil", "Anda telah keluar dari sistem.", "info");
      }, 500);
    }

    // ---------------------------------------------------------
    // A. FUNGSI RENDER MODUL UTAMA (DISEJAJARKAN DI LEVEL UTAMA)
    // ---------------------------------------------------------
    function renderLogin() {
      const temp = document.getElementById('temp-login');
      const container = document.getElementById('app-content');
      if (temp && container) {
        container.innerHTML = '';
        container.appendChild(temp.content.cloneNode(true));
        applyLoginCustomIdentity();
      }
    }

    function renderDashboardAdmin() {
      const temp = document.getElementById('temp-db-admin');
      const container = document.getElementById('app-content');
      if (temp && container) {
        container.innerHTML = '';
        container.appendChild(temp.content.cloneNode(true));
        
        // Pengaman Tipe Data User kustom
        const namaAdmin = (currentUser && currentUser.nama) ? currentUser.nama : "Admin";
        const emailAdmin = (currentUser && currentUser.email) ? currentUser.email : "admin@dapodik.id";

        // Set Profile
        document.getElementById('admin-name').innerText = namaAdmin;
        document.getElementById('admin-email').innerText = emailAdmin;
        document.getElementById('admin-initial').innerText = namaAdmin.charAt(0).toUpperCase();

        // Terapkan identitas kustom (nama portal & logo)
        applyAppCustomIdentity();

        // Fetch spreadsheet info saat ini
        loadDatabaseInfo();
        
        // Tampilkan Tab pertama
        switchAdminTab('overview');
      }
    }

    function renderDashboardSiswa() {
      const temp = document.getElementById('temp-db-siswa');
      const container = document.getElementById('app-content');
      if (temp && container) {
        container.innerHTML = '';
        container.appendChild(temp.content.cloneNode(true));

        applySiswaCustomIdentity();

        const namaSiswa = (currentUser && currentUser.nama) ? currentUser.nama : "Siswa";

        document.getElementById('siswa-display-name').innerText = namaSiswa;
        document.getElementById('siswa-profile-name').innerText = namaSiswa;
        document.getElementById('siswa-avatar').innerText = namaSiswa.charAt(0).toUpperCase();

        // Jalankan pencarian dinamis di seluruh sub-tab jenjang
        fetchSiswaAcademicProfile();
      }
    }

    function renderDashboardGuru() {
      const temp = document.getElementById('temp-db-guru');
      const container = document.getElementById('app-content');
      if (temp && container) {
        container.innerHTML = '';
        container.appendChild(temp.content.cloneNode(true));

        applyGuruCustomIdentity();

        const namaGuru = (currentUser && currentUser.nama) ? currentUser.nama : "Guru";

        document.getElementById('guru-display-name').innerText = namaGuru;
        document.getElementById('guru-profile-name').innerText = namaGuru;
        document.getElementById('guru-avatar').innerText = namaGuru.charAt(0).toUpperCase();

        fetchGuruAcademicProfile();
      }
    }

    function renderDashboardTendik() {
      const temp = document.getElementById('temp-db-tendik');
      const container = document.getElementById('app-content');
      if (temp && container) {
        container.innerHTML = '';
        container.appendChild(temp.content.cloneNode(true));

        applyTendikCustomIdentity();

        const namaTendik = (currentUser && currentUser.nama) ? currentUser.nama : "Tendik";

        document.getElementById('tendik-display-name').innerText = namaTendik;
        document.getElementById('tendik-profile-name').innerText = namaTendik;
        document.getElementById('tendik-avatar').innerText = namaTendik.charAt(0).toUpperCase();

        fetchTendikAcademicProfile();
      }
    }

    // ---------------------------------------------------------
    // B. LOGIKA OPERASIONAL LOGIN (CompLogin.html JS)
    // ---------------------------------------------------------
    function applyLoginCustomIdentity() {
      const customTitle = localStorage.getItem('dapodik_custom_title') || "DAPODIK DIGITAL";
      const customSlogan = localStorage.getItem('dapodik_custom_slogan') || "Sistem Portal Pendidikan Modern";
      const customFooter = localStorage.getItem('dapodik_custom_footer') || "DAPODIK Web App v3.0 \u00A9 2026";
      const customLogo = localStorage.getItem('dapodik_custom_logo');

      const titleEl = document.getElementById('login-app-title');
      const sloganEl = document.getElementById('login-app-slogan');
      const footerEl = document.getElementById('login-app-footer');
      const logoImg = document.getElementById('login-custom-logo');
      const defaultIcon = document.getElementById('login-default-icon');

      if (titleEl) titleEl.innerText = customTitle;
      if (sloganEl) sloganEl.innerText = customSlogan;
      if (footerEl) footerEl.innerText = customFooter;

      if (customLogo && logoImg && defaultIcon) {
        logoImg.src = customLogo;
        logoImg.classList.remove('hidden');
        defaultIcon.classList.add('hidden');
      }
    }

    function togglePasswordVisibility() {
      const pwdInput = document.getElementById('login-password');
      const pwdIcon = document.getElementById('toggle-password-icon');
      if (pwdInput.type === "password") {
        pwdInput.type = "text";
        pwdIcon.className = "fa-solid fa-eye-slash";
      } else {
        pwdInput.type = "password";
        pwdIcon.className = "fa-solid fa-eye";
      }
    }

    // Ambil URL Apps Script aktif secara hirarkis (Utamakan APP_CONFIG dibanding LocalStorage)
    function getActiveGasUrl() {
      return (window.APP_CONFIG && window.APP_CONFIG.scriptUrl) ? window.APP_CONFIG.scriptUrl : (localStorage.getItem('dapodik_gas_url') || "");
    }

    // [BYPASS PRATINJAU]: Autentikasi aman tanpa error Apps Script
    function handleLoginSubmit(event) {
      event.preventDefault();
      const userVal = document.getElementById('login-username').value.trim();
      const passVal = document.getElementById('login-password').value;

      showLoader("Mengautentikasi...");
      
      const activeGasUrl = getActiveGasUrl();

      // Jika Apps Script API tidak terdeteksi atau kosong, paksa gunakan database simulasi lokal
      if (typeof google === 'undefined' || !activeGasUrl) {
        setTimeout(() => {
          emulateLocalDatabase('loginUser', [userVal, passVal], (response) => {
            hideLoader();
            if (response.success) {
              currentUser = response.user;
              localStorage.setItem('dapodik_user', JSON.stringify(currentUser));
              navigateToDashboard(currentUser.role);
              showAlert("Login Sukses (Demo)", `Selamat datang di lingkungan pratinjau, ${currentUser.nama}!`, "success");
            } else {
              showAlert("Akses Ditolak", response.message, "error");
            }
          });
        }, 600);
        return;
      }

      // Mode Jembatan Real-Time Google Sheets
      google.script.run
        .withSuccessHandler((response) => {
          hideLoader();
          if (response.success) {
            currentUser = response.user;
            localStorage.setItem('dapodik_user', JSON.stringify(currentUser));
            navigateToDashboard(currentUser.role);
            showAlert("Login Berhasil", `Selamat datang kembali, ${currentUser.nama}!`, "success");
          } else {
            showAlert("Gagal Masuk", response.message, "error");
          }
        })
        .withFailureHandler((error) => {
          hideLoader();
          showAlert("Gangguan Sistem", "Tidak dapat terhubung ke server. Detail: " + error.message, "error");
        })
        .loginUser(userVal, passVal);
    }

    // C. LOGIKA OPERASIONAL ADMIN (CompDashboardAdmin.html JS)
    // ---------------------------------------------------------
    function applyAppCustomIdentity() {
      const customTitle = localStorage.getItem('dapodik_custom_title') || "ADMIN PORTAL";

    function loadDatabaseInfo() {
      google.script.run
        .withSuccessHandler((info) => {
          document.getElementById('current-ss-name').innerText = info.name;
          document.getElementById('current-ss-name').title = info.activeId;
        })
        .getActiveSpreadsheetInfo();

    function toggleSiswaMenu() {
      const submenu = document.getElementById('submenu-siswa');
      const arrow = document.getElementById('icon-arrow-siswa');
      if (submenu && arrow) {
        submenu.classList.toggle('hidden');
